<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>不足アセットアップロード</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --accent-color: #c0a080;
            --ui-bg: #1e293b;
            --input-bg: #334155;
            --btn-primary: #3b82f6;
            --btn-hover: #2563eb;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--ui-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            border: 1px solid #334155;
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #94a3b8;
        }

        select, input[type="file"] {
            width: 100%;
            padding: 10px;
            background-color: var(--input-bg);
            color: #fff;
            border: 1px solid #475569;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button {
            background-color: var(--btn-primary);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            width: 100%;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .button:hover:not(:disabled) {
            background-color: var(--btn-hover);
        }

        .button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        #message {
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.9em;
            line-height: 1.5;
            min-height: 20px;
        }

        .message-success { background-color: #065f46; color: #a7f3d0; border: 1px solid #059669; }
        .message-error { background-color: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; }
        .message-info { background-color: #1e3a8a; color: #bfdbfe; border: 1px solid #2563eb; }

        .back-link {
            display: block;
            margin-top: 30px;
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>不足アセットのアップロード</h1>

        <div class="form-group">
            <label for="asset-type-select">区分:</label>
            <select id="asset-type-select">
                <option value="">スキャン中...</option>
            </select>
        </div>

        <div class="form-group" id="tag-group" style="display: none;">
            <label for="tag-select" id="tag-label">名前:</label>
            <select id="tag-select" disabled>
                <option value="">--選択してください--</option>
            </select>
        </div>

        <div class="form-group" id="face-group" style="display: none;">
            <label for="face-select">表情タグ:</label>
            <select id="face-select" disabled>
                <option value="">--選択してください--</option>
            </select>
        </div>

        <div class="form-group">
            <label for="asset-file-input">画像ファイルを選択:</label>
            <input type="file" id="asset-file-input" accept="image/*">
        </div>

        <button id="upload-button" class="button" disabled>アップロードを実行</button>
        <div id="message"></div>
    </div>

    <a href="index.html" class="back-link">← ビューアに戻る</a>

    <script>
        const SUPABASE_URL = 'https://sluvdcvxtzlpbqrxfpsg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_dXIvPQtvu-2PunZ1FNkzyA_yczzig09'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let noImageAssetsData = [];

        // DOM Elements
        const assetTypeSelect = document.getElementById('asset-type-select');
        const tagGroup = document.getElementById('tag-group');
        const tagLabel = document.getElementById('tag-label');
        const tagSelect = document.getElementById('tag-select');
        const faceGroup = document.getElementById('face-group');
        const faceSelect = document.getElementById('face-select');
        const assetFileInput = document.getElementById('asset-file-input');
        const uploadButton = document.getElementById('upload-button');
        const messageDiv = document.getElementById('message');

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchNoImageAssets();
        });

        // 1. ビューから画像のないデータを取得
        async function fetchNoImageAssets() {
            displayMessage('シナリオをスキャンして不足情報を抽出中...', 'info');
            try {
                const { data, error } = await supabaseClient
                    .from('missing_assets_view') 
                    .select('*');

                if (error) throw error;

                noImageAssetsData = data.map(item => ({
                    id: item.asset_id,
                    type: item.type,
                    tag: item.tag,
                    face: item.face || ''
                }));

                if (noImageAssetsData.length === 0) {
                    displayMessage('すべての画像が登録済みです。', 'success');
                    assetTypeSelect.innerHTML = '<option value="">--不足なし--</option>';
                    return;
                }

                populateAssetTypeSelect();
                displayMessage(`不足アセット: ${noImageAssetsData.length}件`, 'success');
            } catch (error) {
                console.error(error);
                displayMessage(`データ取得失敗: ${error.message}`, 'error');
            }
        }

        function populateSelect(selectEl, values, placeholder) {
            selectEl.innerHTML = `<option value="">${placeholder}</option>`;
            values.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v === '' ? '（なし）' : v;
                selectEl.appendChild(opt);
            });
        }

        // 2. 区分プルダウンの生成
        function populateAssetTypeSelect() {
            const types = [...new Set(noImageAssetsData.map(i => i.type))].sort();
            populateSelect(assetTypeSelect, types, '--区分を選択--');
        }

        // 3. 区分変更イベント
        assetTypeSelect.addEventListener('change', () => {
            const type = assetTypeSelect.value;
            
            // リセット
            tagSelect.innerHTML = faceSelect.innerHTML = '<option value="">--選択--</option>';
            tagGroup.style.display = faceGroup.style.display = 'none';

            if (type) {
                const tags = [...new Set(noImageAssetsData.filter(i => i.type === type).map(i => i.tag))].sort();
                
                // ラベルの動的変更
                const labels = { 'character': 'キャラクター名', 'background': '背景名', 'special': '演出名' };
                tagLabel.textContent = (labels[type] || '名前') + ':';
                
                populateSelect(tagSelect, tags, '--名前を選択--');
                tagGroup.style.display = 'block';
                tagSelect.disabled = false;
            }
            updateUploadButtonState();
        });

        // 4. 名前（タグ）変更イベント
        tagSelect.addEventListener('change', () => {
            const type = assetTypeSelect.value;
            const tag = tagSelect.value;

            if (type === 'character' && tag) {
                const faces = [...new Set(noImageAssetsData.filter(i => i.type === type && i.tag === tag).map(i => i.face))].sort();
                populateSelect(faceSelect, faces, '--表情を選択--');
                faceGroup.style.display = 'block';
                faceSelect.disabled = false;
            } else {
                faceGroup.style.display = 'none';
                faceSelect.value = '';
            }
            updateUploadButtonState();
        });

        // 5. その他変更イベント
        [faceSelect, assetFileInput].forEach(el => el.addEventListener('change', updateUploadButtonState));

        function updateUploadButtonState() {
            const type = assetTypeSelect.value;
            const tag = tagSelect.value;
            const faceSelected = (type !== 'character') || (faceSelect.value !== "");
            const file = assetFileInput.files.length > 0;
            
            uploadButton.disabled = !(type && tag && faceSelected && file);
        }

        // 6. アップロード実行
        uploadButton.addEventListener('click', async () => {
            const file = assetFileInput.files[0];
            const type = assetTypeSelect.value;
            const tag = tagSelect.value;
            const face = faceSelect.value;

            displayMessage('アップロード中...', 'info');
            uploadButton.disabled = true;

            try {
                // Cloudinaryへ送信 (Vercel API Proxy)
                const formData = new FormData();
                formData.append('file', file);
                formData.append('asset_type', type);
                formData.append('tag', tag);

                const cloudRes = await fetch('/api/media', { method: 'POST', body: formData });
                const cloudData = await cloudRes.json();
                if (!cloudRes.ok) throw new Error(cloudData.error || 'Cloudinaryへのアップロード失敗');

                const imageUrl = cloudData.url;

                // Supabase更新対象の特定
                const target = noImageAssetsData.find(i => 
                    i.type === type && i.tag === tag && i.face === face
                );

                const payload = {
                    asset_type: type,
                    tag: tag,
                    face: face || null,
                    image_url: imageUrl
                };

                let dbError;
                if (target && target.id) {
                    // 既存行を更新
                    const { error } = await supabaseClient.from('assets').update(payload).eq('id', target.id);
                    dbError = error;
                } else {
                    // 新規行を挿入
                    const { error } = await supabaseClient.from('assets').insert([payload]);
                    dbError = error;
                }

                if (dbError) throw dbError;

                displayMessage(`✅ アップロード完了！\nURL: ${imageUrl}`, 'success');
                
                // 入力リセット
                assetFileInput.value = '';
                await fetchNoImageAssets(); // リストを再取得

            } catch (err) {
                console.error(err);
                displayMessage(`エラー: ${err.message}`, 'error');
            } finally {
                uploadButton.disabled = false;
            }
        });

        function displayMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.className = `message-${type}`;
        }
    </script>
</body>
</html>
