<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="/manifest.json">
    <title>勇者ハーレム - ファンタジービューア</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- 🎨 テーマ設定 (異世界ファンタジー・シンプル) --- */
        :root {
            --bg-color: #0f172a;       /* 深い紺色 (背景) */
            --text-color: #e2e8f0;     /* 白に近い灰色 (本文) */
            --accent-color: #c0a080;   /* くすんだゴールド (強調・枠線) */
            --ui-bg: rgba(15, 23, 42, 0.95); /* 半透明の紺色 (UI背景) */
            --font-main: 'Noto Sans JP', sans-serif;
            --font-serif: 'Shippori Mincho', serif; /* タイトル・名前用 */
        }

        html, body { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-color); 
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden; 
            user-select: none;
        }

        /* --- 🖼️ ビューアエリア --- */
        #novel-container { 
            position: relative; width: 100%; height: 100%; 
            background-color: #000;
            overflow: hidden; /* 画像のはみ出し防止 */
        }

        /* レイヤー共通設定 */
        .layer-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: opacity 0.6s ease; /* ふんわり切り替え */
            opacity: 0;
            will-change: opacity;
        }
        .layer-image.visible { opacity: 1; }

        #background { z-index: 0; }
        
        /* エフェクトレイヤー（乗算やスクリーンなどが必要ならmix-blend-modeを追加） */
        #effect-image { 
            z-index: 3; object-fit: cover; pointer-events: none; 
            mix-blend-mode: screen; /* 光のエフェクト等はスクリーン合成 */
        }

        /* 🧍 キャラクター（1:1画像対応・大型化） */
        #character { 
            position: absolute; 
            /* 【位置調整】1:1画像を画面下部から大きく突き出す */
            left: 50%; 
            transform: translateX(-50%); 
            
            /* 【サイズ調整】ビューポートの高さ基準で大きく表示 */
            max-height: 140vh; 
            
            /* 【切り抜き】コンテナに合わせて拡大し、はみ出しを切り抜く */
            object-fit: cover; 
            
            z-index: 1; 
            /* 【演出強化】フィルターとトランジションは維持し、シャドウを追加 */
            transition: filter 0.3s ease, transform 0.3s ease; 
            
        }

        #character.visible { opacity: 1; }
        
        /* 回想シーンなどで使用するシルエット化 */
        #character.flashback-shadow { 
            filter: brightness(0) opacity(0.7) drop-shadow(0 0 5px rgba(255,255,255,0.2)); 
        }

        /* --- 💬 ダイアログボックス（スタイリッシュ・ファンタジー） --- */
        #dialogue-box {
            position: absolute; bottom: 0; left: 0; width: 100%; 
            min-height: 28%; /* 少し高さを確保 */
            max-height: 45%;
            
            background: linear-gradient(to top, var(--ui-bg) 0%, rgba(15, 23, 42, 0.8) 100%);
            border-top: 2px solid var(--accent-color); /* ゴールドのライン */
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            
            padding: 20px 30px 40px; /* 下に余裕を持たせる */
            box-sizing: border-box; 
            z-index: 10; 
            display: flex; flex-direction: column;
        }
        
        #character-name { 
            font-family: var(--font-serif); /* 明朝体 */
            font-size: 1.2em; 
            font-weight: 700; 
            color: var(--accent-color);
            margin-bottom: 12px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 0.05em;
        }
        
        #dialogue-text { 
            line-height: 1.8; 
            letter-spacing: 0.08em;
            color: var(--text-color);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); 
            user-select: text; 
            white-space: pre-wrap; 
        }
        
        #next-indicator { 
            position: absolute; bottom: 15px; right: 25px; 
            font-size: 1.2em; color: var(--accent-color);
            animation: float 1.5s ease-in-out infinite; 
            cursor: pointer;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); opacity: 0.8; } 50% { transform: translateY(-5px); opacity: 1; } }

        /* --- ⚙️ UIコントロール（フローティング） --- */
        #floating-controls {
            position: fixed; top: 15px; left: 15px;
            z-index: 150; display: flex; gap: 10px;
        }

        .control-button { 
            width: 44px; height: 44px; 
            border-radius: 8px; /* 角丸四角形に変更 */
            border: 1px solid rgba(192, 160, 128, 0.3); /* 薄いゴールド枠 */
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(5px);
            color: var(--text-color); 
            font-size: 1.2em;
            cursor: pointer; 
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .control-button:hover { background: rgba(192, 160, 128, 0.2); border-color: var(--accent-color); }
        .control-button:active { transform: scale(0.95); }

        /* ドロップダウンメニュー */
        .dropdown { position: relative; }
        .dropdown-content {
            display: none; position: absolute; top: 55px; left: 0;
            background-color: var(--ui-bg); 
            border: 1px solid var(--accent-color);
            min-width: 180px;
            border-radius: 4px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); 
        }
        .dropdown-content button {
            color: var(--text-color); padding: 12px 16px; width: 100%; text-align: left;
            background: none; border: none; cursor: pointer; font-family: var(--font-main);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .dropdown-content button:hover { background-color: rgba(192, 160, 128, 0.2); }

        /* --- 📝 モーダル（編集画面など） --- */
        #modal { 
            display: none; position: fixed; z-index: 200; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); 
            justify-content: center; align-items: center; 
            backdrop-filter: blur(5px);
        }
        .modal-container { 
            background: #1e293b; 
            border: 1px solid var(--accent-color);
            padding: 25px; border-radius: 8px; 
            width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; 
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        h2 { color: var(--accent-color); font-family: var(--font-serif); border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }
        
        input, textarea, select {
            width: 100%; padding: 10px; margin: 5px 0 15px;
            background: #0f172a; border: 1px solid #475569; 
            color: #fff; border-radius: 4px; box-sizing: border-box;
            font-family: var(--font-main);
        }
        input:focus, textarea:focus { outline: none; border-color: var(--accent-color); }
        
        button.action-btn { background: var(--accent-color); color: #0f172a; font-weight: bold; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; transition: opacity 0.2s; }
        button.action-btn:hover { opacity: 0.9; }
        .cancel-button { background: transparent; border: 1px solid #64748b; color: #94a3b8; margin-top: 10px; width: 100%; padding: 10px; border-radius: 4px; cursor: pointer; }
        .delete-button { background: #7f1d1d; color: #fecaca; width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }

        /* --- 🔢 エピソードリスト（グリッド表示） --- */
        #episode-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5列表示 */
            gap: 8px;
            margin-bottom: 20px;
        }
        #episode-list .control-button {
            width: 100%; /* グリッドセルいっぱいに */
            height: 48px;
            font-family: var(--font-serif);
            font-size: 1.1em;
            margin: 0;
            padding: 0;
        }

        /* --- ⏳ ローディング --- */
        #loading-indicator {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: var(--accent-color); z-index: 300;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s;
            font-family: var(--font-serif);
        }
        .spinner {
            width: 50px; height: 50px; 
            border: 3px solid rgba(192, 160, 128, 0.2); 
            border-top: 3px solid var(--accent-color);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <div id="loading-indicator">
        <div class="spinner"></div>
        <div id="loading-text">Loading World...</div>
    </div>

    <div id="floating-controls">
        <button id="episode-select-icon" class="control-button" title="物語を選択">
            <span>📖</span> 
        </button>

        <button id="edit-scene-button" class="control-button" >
            <span>✏️</span> 
        </button>
    
     
        <button onclick="window.location.href='asset_upload.html'"  class="control-button" >
            <span>🖼️</span> 
        </button>

    </div>
    
    <select id="episode-select" style="display: none;"></select>
    
    <div id="novel-container">
        <div id="background" class="layer-image"></div>
        
        <img id="special-image" class="layer-image" src="" alt="" style="display: none;">
        
        <img id="character" src="" alt="">
        
        <img id="effect-image" class="layer-image" src="" alt="" style="display: none;">

        <div id="dialogue-box">
            <div id="character-name"></div>
            <div id="dialogue-text"></div>
            <div id="next-indicator">▼</div>
        </div>
    </div>

    <div id="modal">
        <div id="episode-list-container" class="modal-container" style="display: none;">
            <h2>物語の選択</h2>
            <div id="episode-list"></div>
            <button type="button" onclick="closeModal()" class="cancel-button">閉じる</button>
        </div>
        
<div id="edit-form-container" class="modal-container" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 id="modal-title" style="margin: 0;">シーン編集</h2>
        
        <div style="display: flex; gap: 15px; align-items: center;">
            <button type="button" id="header-add-switch-btn" class="icon-btn" title="新規シーン追加へ切替" style="background: none; border: none; cursor: pointer; font-size: 1.4rem; color: #add8e6;">
                ➕
            </button>
            <button type="button" id="header-delete-btn" class="icon-btn" title="シーンを削除" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #ff6b6b; display: none;">
                🗑️
            </button>
        </div>
    </div>
            <form id="edit-form">
                <label>エピソード: <input type="text" id="edit-episode" name="episode"></label>
                <label>シーン番号: <input type="text" id="edit-scene-number" name="scene_number"></label>
                <label>話者: <input type="text" id="edit-character" name="character" list="characters-list"></label>
                <datalist id="characters-list"></datalist>
                
                <label>本文: <textarea id="edit-text" name="text" rows="3"></textarea></label>
                
                <label>表情タグ: <input type="text" id="edit-face" name="face" list="faces-list"></label>
                <datalist id="faces-list"></datalist>
                
                <label>背景: <input type="text" id="edit-background" name="background" list="backgrounds-list"></label>
                <datalist id="backgrounds-list"></datalist>
                
                <label>特殊画像: <input type="text" id="edit-special" name="special" list="special-list"></label>
                <datalist id="special-list"></datalist>

                <label>エフェクト: <input type="text" id="edit-effect" name="effect" list="effects-list"></label>
                <datalist id="effects-list"></datalist>

               <button type="submit" id="save-scene-button" class="action-btn">保存</button>
        <button type="button" id="confirm-delete-button" style="display: none;"></button>
        <button type="button" id="cancel-edit-button" class="cancel-button">キャンセル</button>
            </form>
        </div>
    </div>

<script>
/**
     * 設定定数
     */

    /* --- ⚙️ API設定 (Supabase) --- */
    // ※ プロジェクトの設定画面 (Settings > API) からコピーした値を貼り付けてください
    const SUPABASE_URL = 'https://sluvdcvxtzlpbqrxfpsg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_dXIvPQtvu-2PunZ1FNkzyA_yczzig09'; 
    // 変数名を supabaseClient ではなく supabase にする
    // ライブラリの supabase と区別するため、変数名を変更します
// 変数名を supabaseClient にして重複を避ける
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const CONFIG = {
        PRELOAD_COUNT: 5,       // 先読み数
        STORAGE_KEY: 'novel_viewer_save'
    };


    /**
     * 状態管理
     */
    let globalLastBackground = "";

let state = {
        episodeData: [],
        sceneIndex: 0,
        isAuto: false,
        autoTimer: null,
        episodeNumbers: [],
        // 名称と構造を以下のように変更
        loadedAssets: { bg: {}, char: {}, special: {}, effect: {} },
        modalMode: '',
        lastBackgroundTag: "" 
    };

    const ui = {
        text: document.getElementById('dialogue-text'),
        name: document.getElementById('character-name'),
        charImg: document.getElementById('character'),
        bgDiv: document.getElementById('background'),
        specialImg: document.getElementById('special-image'),
        effectImg: document.getElementById('effect-image'),
        container: document.getElementById('novel-container'),
        loading: document.getElementById('loading-indicator'),
        epSelect: document.getElementById('episode-select'),
        modal: document.getElementById('modal')
    };

    /* =================================================================
        初期化 & データロード
       ================================================================= */

    async function initialize() {
        try {
            await populateEpisodeSelect();
            
            // ★UX改善：オートセーブの自動適用（確認ダイアログなし）
            const savedData = loadProgress();
            let startEp = state.episodeNumbers[0];
            let startIndex = 0;
            
            if (savedData && state.episodeNumbers.includes(savedData.episode)) {
                // 確認なしで前回の続きをセット
                startEp = savedData.episode;
                startIndex = savedData.index || 0;
                console.log(`Resuming from Ep.${startEp}, Scene ${startIndex}`);
            }

            ui.epSelect.value = startEp;
            await loadEpisodeData(startEp, startIndex);

        } catch (e) {
            console.error(e);
            alert('初期化エラー: ' + e.message);
            showLoading(false);
        }
    }
// 他の state 定義などがある場所に追記
async function loadEpisodeData(episodeNumber, target_scene_number = null) {
    showLoading(true);
    try {
        // 1. Supabaseからデータを取得
        const { data, error } = await supabaseClient
            .from('vs_scenes_with_assets')
            .select('*')
            .eq('episode', episodeNumber)
            .order('scene_number', { ascending: true });

        if (error) throw error;
        if (!data || data.length === 0) {
            alert('指定されたエピソードにデータがありません。');
            return;
        }

        // --- 📥 データの穴埋め・背景引き継ぎ処理 ---
        let lastCharacterImg = "";
        let characterDisplayEnabled = false; 
        
        // 【重要】背景は「グローバルに保存されている前回の画像」から開始する
        let currentProcessBackground = globalLastBackground;

        const filledData = data.map(scene => {
            // --- A. 背景の引き継ぎ処理 ---
            // 背景画像(URL)が空の場合、直前の画像URLをセットする
            if (!scene.background_image || scene.background_image === "") {
                scene.background_image = currentProcessBackground;
            } else {
                // 新しい背景が設定されている場合、キャラ表示フラグをリセット（場所移動の想定）
                if (currentProcessBackground !== scene.background_image) {
                    characterDisplayEnabled = false;
                }
                // 最新の背景画像URLを更新
                currentProcessBackground = scene.background_image;
            }

            // --- B. 挿絵モード（Special）の判定 ---
            const isIllustrationMode = (scene.special && scene.special !== "OFF");

            // --- C. キャラクター画像の処理 ---
            const charName = scene.character || "";
            const isSkipTarget = (charName === "ナレーション" || charName === "チハル");

            if (!isSkipTarget && scene.character_image) {
                characterDisplayEnabled = true;
                lastCharacterImg = scene.character_image;
            }

            // 表示の確定ロジック
            if (isIllustrationMode) {
                scene.character_image = "";
                // 挿絵のときは背景を消す（もし背景の上に挿絵を出すならここを調整）
                scene.background_image = ""; 
            } else if (!characterDisplayEnabled) {
                scene.character_image = "";
            } else if (isSkipTarget) {
                scene.character_image = lastCharacterImg;
            } else {
                if (!scene.character_image || scene.character_image === "") {
                    scene.character_image = lastCharacterImg;
                } else {
                    lastCharacterImg = scene.character_image;
                }
            }
            return scene;
        });

        // 最後に現れた背景画像URLを保存（次のエピソード読み込み時に利用）
        globalLastBackground = currentProcessBackground;

        // 2. 状態を更新
        state.episodeData = filledData;

        // 3. 表示位置（インデックス）を決定
        if (target_scene_number) {
            const idx = filledData.findIndex(s => Number(s.scene_number) === Number(target_scene_number));
            state.sceneIndex = idx !== -1 ? idx : 0;
        } else {
            state.sceneIndex = 0;
        }

        renderScene(state.episodeData[state.sceneIndex]); 
        updateUI();

    } catch (err) {
        console.error('Data loading error:', err);
        alert('読み込みエラー: ' + err.message);
    } finally {
        showLoading(false);
    }
}

async function preloadAssetsSmart(currentIndex, count) {
        const endIndex = Math.min(currentIndex + count, state.episodeData.length);
        const targets = state.episodeData.slice(currentIndex, endIndex);
        
        const required = { bg: new Set(), char: new Set(), special: new Set(), effect: new Set() };
        
        targets.forEach(s => {
            // NOTE: 直接URL(s.background_image等)はfetchAssetsでは先読みできないが、
            // タグ指定のアセットだけはここでリクエストする
            if (s.background && !state.loadedAssets.bg[s.background]) required.bg.add(s.background);
            if (s.character && !state.loadedAssets.char[s.character]) required.char.add(s.character);
            if (s.special && !state.loadedAssets.special[s.special]) required.special.add(s.special);
            if (s.effect && !state.loadedAssets.effect[s.effect]) required.effect.add(s.effect);
        });

        const promises = [];
        if (required.bg.size) promises.push(fetchAssets('background', required.bg, state.loadedAssets.bg));
        if (required.char.size) promises.push(fetchAssets('character', required.char, state.loadedAssets.char));
        if (required.special.size) promises.push(fetchAssets('special_image', required.special, state.loadedAssets.special));
        if (required.effect.size) promises.push(fetchAssets('effect', required.effect, state.loadedAssets.effect));

        await Promise.all(promises);
    }

    async function backgroundLoadRest(startIndex) {
        const CHUNK = 10;
        for (let i = startIndex; i < state.episodeData.length; i += CHUNK) {
            await preloadAssetsSmart(i, CHUNK);
            await new Promise(r => setTimeout(r, 1000));
        }
    }

  async function fetchAssets(type, tagSet, targetStore) {
    if (!tagSet.size) return;
    
    try {
        // 修正ポイント1: supabase -> supabaseClient に変更
        // 修正ポイント2: 必要なアセットタイプで絞り込み
        const { data: list, error } = await supabaseClient
            .from('assets')
            .select('*')
            .eq('asset_type', type);

        if (error) throw error;

        (list || []).forEach(a => {
            // 修正ポイント3: カラム名を image_url と face に合わせる
            if (a.tag && a.image_url) {
                if (type === 'character' && a.face) {
                    // キャラクター名_表情タグ をキーにする
                    const key = `${a.tag}_${a.face}`;
                    targetStore[key] = a.image_url;
                } else {
                    // 背景や演出用
                    targetStore[a.tag] = a.image_url;
                }
            }
        });
    } catch (e) {
        console.warn(`Failed to fetch assets for ${type}:`, e);
    }
}

/* =================================================================
        描画 (レンダリング)
       ================================================================= */

function renderScene(s) {
    if (!s) return;

    // --- 💬 テキスト・名前の表示 ---
    ui.name.textContent = s.character || '';
    ui.text.textContent = s.text || ''; 

    // --- 🖼️ 描画判定 ---
    // ① special に値があり、かつ "OFF" でない場合は挿絵モード
    const isIllustrationMode = (s.special && s.special !== "OFF");

// --- 🌌 背景（Background）の描画 ---
    const bgUrl = isIllustrationMode ? (s.special_image || s.special) : (s.background_image || s.background);
   
 // ui.bg を ui.bgDiv に変更// ui.bg ではなく ui.bgDiv を使う
updateImage(ui.bgDiv, bgUrl, state.loadedAssets.bg, true);

    // --- 👥 キャラクター（Character）の描画 ---
    if (isIllustrationMode || (!s.character_image && !s.character)) {
        // 挿絵モード、またはキャラ指定がない場合は非表示
        ui.charImg.style.display = 'none';
    } else {
        ui.charImg.style.display = 'block';
        updateImage(ui.charImg, s.character_image || s.character, state.loadedAssets.char, false);
    }

    // --- ✨ エフェクト・その他 ---
    // SpecialImgは背景として使っているので、ここでは個別に表示させない（または非表示にする）
    if (ui.specialImg) ui.specialImg.style.display = 'none';

    updateImage(ui.effectImg, s.effect_image || s.effect, state.loadedAssets.effect, false);

    // キャラクターの演出クラス
    ui.charImg.className = ''; 
    if (s.effect && String(s.effect).includes('影')) {
        ui.charImg.classList.add('flashback-shadow');
    }
    
    saveProgress();
}

// 画面上のUI（ボタンの活性・非活性など）を更新する関数
function updateUI() {
    if (!state.episodeData || state.episodeData.length === 0) return;

    const isFirst = state.sceneIndex === 0;
    const isLast = state.sceneIndex === state.episodeData.length - 1;

    // 前へ・次へボタンの制御（ID名はご自身のHTMLに合わせてください）
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    if (prevBtn) prevBtn.disabled = isFirst;
    if (nextBtn) nextBtn.disabled = isLast;

    // 現在の進捗表示（例：1 / 20）
    const counter = document.getElementById('scene-counter');
    if (counter) {
        counter.textContent = `${state.sceneIndex + 1} / ${state.episodeData.length}`;
    }
}

    function updateImage(el, tag, assetStore, isBg) {
        const currentScene = state.episodeData[state.sceneIndex];
        let src = '';
        
        if (tag && (tag.startsWith('http') || tag.startsWith('data:'))) {
            src = tag;
        } 
        else if (tag && assetStore) {
            if (el === ui.charImg && currentScene) {
                const faceTag = currentScene.face || 'default';
                const key = `${tag}_${faceTag}`; 
                
                if (assetStore[key]) src = assetStore[key];
                else if (assetStore[tag]) src = assetStore[tag];
            } else {
                if (assetStore[tag]) src = assetStore[tag];
            }
        }

        if (isBg) {
            if (!src) {
                el.classList.remove('visible');
            } else {
                if (el.style.backgroundImage.includes(src)) {
                     el.classList.add('visible'); 
                     return;
                }
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    el.style.backgroundImage = `url("${src}")`;
                    el.classList.add('visible');
                };
            }
        } else {
            if (!src) {
                el.classList.remove('visible');
                el.src = '';
                el.style.display = 'none';
            } else {
                el.style.display = 'block';
                if (el.src === src && el.classList.contains('visible')) return;

                el.classList.remove('visible');
                el.src = src;
                
                if (el.complete) {
                    el.classList.add('visible');
                } else {
                    el.onload = () => el.classList.add('visible');
                }
            }
        }
    }

    /* =================================================================
        操作イベント
       ================================================================= */

    ui.container.addEventListener('pointerup', e => {
        if (state.modalMode || ui.modal.style.display === 'flex') return;
        if (e.target.closest('#floating-controls')) return;

        const isLeft = e.clientX < window.innerWidth * 0.3;
        if (isLeft) prevScene();
        else nextScene();
    });

    function nextScene() {
        if (state.sceneIndex < state.episodeData.length - 1) {
            state.sceneIndex++;
            renderScene(state.episodeData[state.sceneIndex]);
        } else {
            tryNextEpisode();
        }
    }

    function prevScene() {
        if (state.sceneIndex > 0) {
            state.sceneIndex--;
            renderScene(state.episodeData[state.sceneIndex]);
        }
    }

    function tryNextEpisode() {
        const currentEp = parseInt(ui.epSelect.value);
        const idx = state.episodeNumbers.indexOf(currentEp);
        if (idx !== -1 && idx < state.episodeNumbers.length - 1) {
            if(confirm('次のエピソードへ進みますか？')) {
                const nextEp = state.episodeNumbers[idx + 1];
                ui.epSelect.value = nextEp;
                loadEpisodeData(nextEp);
            }
        }
    }

    /* =================================================================
        API & ユーティリティ
       ================================================================= */

    async function fetchJson(url, params = {}) {
        const urlObj = new URL(url);
        if(params.filters) urlObj.searchParams.append('filters', params.filters);
        const res = await fetch(urlObj.toString());
        if (!res.ok) throw new Error(`API Error: ${res.status}`);
        return res.json();
    }

    function showLoading(show) {
        ui.loading.style.opacity = show ? 1 : 0;
        ui.loading.style.pointerEvents = show ? 'auto' : 'none';
    }

    function saveProgress() {
        localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify({
            episode: parseInt(ui.epSelect.value),
            index: state.sceneIndex
        }));
    }

    function loadProgress() {
        const json = localStorage.getItem(CONFIG.STORAGE_KEY);
        return json ? JSON.parse(json) : null;
    }

 // index.html の 670行目付近を修正
document.getElementById('edit-form').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const rawData = Object.fromEntries(formData.entries());

    const episodeNum = Number(rawData.episode);
    const targetSceneNum = Number(rawData.scene_number);

    const sceneData = {
        episode: episodeNum,
        scene_number: targetSceneNum,
        character: rawData.character,
        text: rawData.text,
        face: rawData.face,
        special: rawData.special,
        background: rawData.background,
        effect: rawData.effect
    };

    try {
        showLoading(true);

        if (state.modalMode === 'add') {
            // --- ★追加：シーン番号の繰り上げ処理 ---
            // 同じエピソード内で、挿入したい番号以上のシーンをすべて +1 する
            // 直接 SQL を叩けないため、RPCを使うか、一度取得して更新する必要があります。
            // ここではシンプルに「現在の番号以上のものをすべてカウントアップ」するロジックを入れます。
            
            // 1. 挿入箇所より後ろのシーンを特定
            const { data: laterScenes, error: fetchError } = await supabaseClient
                .from('scenes')
                .select('id, scene_number')
                .eq('episode', episodeNum)
                .gte('scene_number', targetSceneNum);

            if (fetchError) throw fetchError;

            // 2. 後ろのシーンがある場合、番号を +1 更新（逆順に更新しないと重複エラーが出る可能性があるためループで処理）
            if (laterScenes && laterScenes.length > 0) {
                // 大きい順にソートして更新（一意制約エラー対策）
                laterScenes.sort((a, b) => b.scene_number - a.scene_number);
                
                for (const scene of laterScenes) {
                    await supabaseClient
                        .from('scenes')
                        .update({ scene_number: scene.scene_number + 1 })
                        .eq('id', scene.id);
                }
            }

            // 3. 空いた場所に新規挿入
            const { error: insertError } = await supabaseClient
                .from('scenes')
                .insert([sceneData]);
            if (insertError) throw insertError;

        } else {
            // 更新（既存の編集）
            const { error } = await supabaseClient
                .from('scenes')
                .update(sceneData)
                .eq('id', state.episodeData[state.sceneIndex].id);
            if (error) throw error;
        }

        closeModal();
        // 追加・更新した番号のシーンへ移動
        loadEpisodeData(episodeNum, targetSceneNum);
        
    } catch (err) {
        console.error(err);
        alert('保存エラー: ' + err.message);
        showLoading(false);
    }
};

// index.html 700行目付近を修正
document.getElementById('confirm-delete-button').onclick = async () => {
    const currentScene = state.episodeData[state.sceneIndex];
    if (!currentScene || !confirm(`シーン番号 ${currentScene.scene_number} を削除しますか？\n(以降のシーン番号は自動的に繰り上げられます)`)) return;

    try {
        showLoading(true);
        const episodeNum = Number(ui.epSelect.value);
        const deletedSceneNum = Number(currentScene.scene_number);

        // 1. 対象のシーンを削除
        const { error: deleteError } = await supabaseClient
            .from('scenes')
            .delete()
            .eq('id', currentScene.id);

        if (deleteError) throw deleteError;

        // 2. ★追加：削除された番号より後ろのシーンをすべて「-1」する
        const { data: laterScenes, error: fetchError } = await supabaseClient
            .from('scenes')
            .select('id, scene_number')
            .eq('episode', episodeNum)
            .gt('scene_number', deletedSceneNum); // 削除した番号より大きいもの

        if (fetchError) throw fetchError;

        if (laterScenes && laterScenes.length > 0) {
            // 小さい順にソートして更新（一意制約エラーを避けるため）
            laterScenes.sort((a, b) => a.scene_number - b.scene_number);

            for (const scene of laterScenes) {
                await supabaseClient
                    .from('scenes')
                    .update({ scene_number: scene.scene_number - 1 })
                    .eq('id', scene.id);
            }
        }

        alert('削除と番号の整理が完了しました');
        closeModal();

        // 前のシーン、もしくは先頭に戻る
        const targetNum = Math.max(1, deletedSceneNum - 1);
        loadEpisodeData(episodeNum, targetNum);

    } catch (err) {
        console.error(err);
        alert('削除エラー: ' + err.message);
        showLoading(false);
    }
};
