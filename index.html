<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="/manifest.json">
    <title>勇者ハーレム - ファンタジービューア</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- 🎨 テーマ設定 (異世界ファンタジー・シンプル) --- */
        :root {
            --bg-color: #0f172a;       /* 深い紺色 (背景) */
            --text-color: #e2e8f0;     /* 白に近い灰色 (本文) */
            --accent-color: #c0a080;   /* くすんだゴールド (強調・枠線) */
            --ui-bg: rgba(15, 23, 42, 0.95); /* 半透明の紺色 (UI背景) */
            --font-main: 'Noto Sans JP', sans-serif;
            --font-serif: 'Shippori Mincho', serif; /* タイトル・名前用 */
        }

        html, body { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-color); 
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden; 
            user-select: none;
        }

        /* --- 🖼️ ビューアエリア --- */
 #novel-container {
    position: relative;
    width: 100%;
    height: 100%;
    background-color: #000;
    overflow: hidden;
    /* 【重要】ブラウザのデフォルトスワイプ（戻る・進む）を無効化し、JSで制御可能にする */
    touch-action: none; 
}

        /* レイヤー共通設定 */
        .layer-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: opacity 0.6s ease; /* ふんわり切り替え */
            opacity: 0;
            will-change: opacity;
        }
        .layer-image.visible { opacity: 1; }

        #background { z-index: 0; }
        
        /* エフェクトレイヤー（乗算やスクリーンなどが必要ならmix-blend-modeを追加） */
        #effect-image { 
            z-index: 3; object-fit: cover; pointer-events: none; 
            mix-blend-mode: screen; /* 光のエフェクト等はスクリーン合成 */
        }

#character {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    max-height: 140vh;
    object-fit: cover;
    z-index: 1;
    transition: filter 0.3s ease, transform 0.3s ease;
}

/* styleタグ内に追加・修正 */
#novel-container {
    position: relative;
    width: 100%;
    height: 100%;
    background-color: #000;
    overflow: hidden;
    /* ブラウザ固有の左右スワイプ挙動を無効化し、JSでの制御を優先させる */
    touch-action: pan-y; 
}

        #character.visible { opacity: 1; }
        
        /* 回想シーンなどで使用するシルエット化 */
        #character.flashback-shadow { 
            filter: brightness(0) opacity(0.7) drop-shadow(0 0 5px rgba(255,255,255,0.2)); 
        }

        /* --- 💬 ダイアログボックス（スタイリッシュ・ファンタジー） --- */
        #dialogue-box {
            position: absolute; bottom: 0; left: 0; width: 100%; 
            min-height: 28%; /* 少し高さを確保 */
            max-height: 45%;
            
            background: linear-gradient(to top, var(--ui-bg) 0%, rgba(15, 23, 42, 0.8) 100%);
            border-top: 2px solid var(--accent-color); /* ゴールドのライン */
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            
            padding: 20px; /* 下に余裕を持たせる */
            box-sizing: border-box; 
            z-index: 10; 
            display: flex; flex-direction: column;
        }
        
        #character-name { 
            font-family: var(--font-serif); /* 明朝体 */
            font-size: 1.2em; 
            font-weight: 700; 
            color: var(--accent-color);
            margin-bottom: 12px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 0.05em;
        }
        
        #dialogue-text { 
            letter-spacing: 0.08em;
            color: var(--text-color);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); 
            user-select: text; 
            white-space: pre-wrap; 
        }
        
        #next-indicator { 
            position: absolute; bottom: 15px; right: 25px; 
            font-size: 1.2em; color: var(--accent-color);
            animation: float 1.5s ease-in-out infinite; 
            cursor: pointer;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); opacity: 0.8; } 50% { transform: translateY(-5px); opacity: 1; } }

        /* --- ⚙️ UIコントロール（フローティング） --- */
        #floating-controls {
            position: fixed; top: 15px; left: 15px;
            z-index: 150; display: flex; gap: 10px;
        }

        .control-button { 
            width: 44px; height: 44px; 
            border-radius: 8px; /* 角丸四角形に変更 */
            border: 1px solid rgba(192, 160, 128, 0.3); /* 薄いゴールド枠 */
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(5px);
            color: var(--text-color); 
            font-size: 1.2em;
            cursor: pointer; 
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .control-button:hover { background: rgba(192, 160, 128, 0.2); border-color: var(--accent-color); }
        .control-button:active { transform: scale(0.95); }

        /* ドロップダウンメニュー */
        .dropdown { position: relative; }
        .dropdown-content {
            display: none; position: absolute; top: 55px; left: 0;
            background-color: var(--ui-bg); 
            border: 1px solid var(--accent-color);
            min-width: 180px;
            border-radius: 4px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); 
        }
        .dropdown-content button {
            color: var(--text-color); padding: 12px 16px; width: 100%; text-align: left;
            background: none; border: none; cursor: pointer; font-family: var(--font-main);
        }
        .dropdown-content button:hover { background-color: rgba(192, 160, 128, 0.2); }

  /* --- 📝 モーダル：基本構造 --- */
#modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 2000; display: none; justify-content: center; align-items: center;
}
#modal-overlay {
    position: absolute; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px);
}
#modal-content {
    position: relative; width: 90%; max-width: 800px;
    background: var(--bg-color); border: 1px solid var(--accent-color);
    border-radius: 16px; padding: 30px; z-index: 2001;
    max-height: 80vh; overflow-y: auto; /* overflowを修正 */
}
.modal-close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    background: rgba(192, 160, 128, 0.1);
    border: 1px solid var(--accent-color);
    color: var(--accent-color);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
}

/* フルスクリーン用のスタイル */
.fullscreen-content {
    position: relative;
    width: 100% !important;
    max-width: 100% !important;
    height: 100% !important;
    max-height: 100vh !important;
    background: var(--bg-color);
    padding: 80px 20px 40px 20px !important; /* 上部にヘッダー分の余白 */
    box-sizing: border-box;
    overflow-y: auto !important; /* コンテンツが長くてもスクロール可能に */
    -webkit-overflow-scrolling: touch;
    border: none !important;
    border-radius: 0 !important;
}

/* あらすじの長文エリア */
.ep-summary-fulltext {
    font-size: 1rem;
    line-height: 1.8;
    color: var(--text-color);
    white-space: pre-wrap;
    margin-bottom: 40px;
    background: rgba(255,255,255,0.03);
    padding: 15px;
    border-radius: 8px;
}

/* 下部に流れるボタン群 */
.ep-footer-buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
    padding-bottom: 40px; /* 最後のボタンの下に余白 */
}

.cancel-button-link {
    background: none;
    border: none;
    color: #94a3b8;
    text-decoration: underline;
    cursor: pointer;
    font-size: 0.9rem;
}

/* ヘッダー固定 */
.modal-header-controls {
    position: fixed; /* absoluteからfixedに変更してスクロールしても付いてくるように */
    top: 0;
    left: 0;
    right: 0;
    padding: 15px 20px;
    display: flex;
    gap: 10px;
}

.custom-select-mini {
    flex-grow: 1; /* プルダウンを可能な限り広げる */
    padding: 8px;
    border: 1px solid var(--accent-color);
    color: var(--text-color);
    border-radius: 6px;
    font-size: 0.9rem;
}

.modal-control-btn {
    flex: 0 0 40px;
    height: 40px;
    background: rgba(192, 160, 128, 0.1);
    border: 1px solid var(--accent-color);
    color: var(--accent-color);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.2rem;
}

.ep-button-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
}


.modal-close-btn:hover {
    background: var(--accent-color);
    color: var(--bg-color);
}
        h2 { color: var(--accent-color); font-family: var(--font-serif); border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }
        
        input, textarea, select {
            width: 100%; padding: 10px; margin: 5px 0 15px;
            background: #0f172a; border: 1px solid #475569; 
            color: #fff; border-radius: 4px; box-sizing: border-box;
            font-family: var(--font-main);
        }
        input:focus, textarea:focus { outline: none; border-color: var(--accent-color); }
        
        button.action-btn { background: var(--accent-color); color: #0f172a; font-weight: bold; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; transition: opacity 0.2s; }
        button.action-btn:hover { opacity: 0.9; }
        .cancel-button { background: transparent; border: 1px solid #64748b; color: #94a3b8; margin-top: 10px; width: 100%; padding: 10px; border-radius: 4px; cursor: pointer; }
        .delete-button { background: #7f1d1d; color: #fecaca; width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }


        #immersive-edit-trigger {
    position: fixed;
    top: 15px;
    right: 70px; /* メニューボタンの隣 */
    width: 40px;
    height: 40px;
    background: rgba(192, 160, 128, 0.2);
    border: 1px solid var(--accent-color);
    color: var(--accent-color);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 100;
    transition: 0.3s;
    backdrop-filter: blur(5px);
}

.modal-close-btn-circle {
    background: rgba(192, 160, 128, 0.1);
    border: 1px solid var(--accent-color);
    color: var(--accent-color);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 1.2rem;
    transition: 0.3s;
}

.modal-close-btn-circle:hover {
    background: var(--accent-color);
    color: var(--bg-color);
    transform: translateY(-2px);
}

/* 編集フォーム内のラベル */
#ep-edit-form-area .label {
    font-size: 0.75rem;
    color: var(--accent-color);
    display: block;
    margin-bottom: 5px;
}

#immersive-edit-trigger:hover {
    background: var(--accent-color);
    color: var(--bg-color);
    transform: scale(1.1);
}

/* 編集モード中のダイアログボックス強調 */
.editing-active #dialogue-box {
    border-top: 2px solid #ffeb3b; /* 編集中の色 */
    box-shadow: 0 -5px 30px rgba(255, 235, 59, 0.2);
}
/* =================================================================
    UX改善：インライン編集 & アセット変更CSS
   ================================================================= */

/* 1. 枠なしインライン編集フォーム：通常テキストと区別がつかないデザイン */
#inline-edit-form {
    display: none;
    flex-direction: column;
    width: 100%;
}


/* 保存/戻るボタンコンテナ */
#inline-edit-form .button-container {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 5px;
}

/* 保存ボタン */
#inline-save-btn {
    background: var(--accent-color);
    color: var(--bg-color);
    border: none;
    padding: 3px 12px;
    cursor: pointer;
    border-radius: 4px;
    font-weight: bold;
}

/* 戻るボタン */
#inline-cancel-btn {
    color: #ccc;
    border: none;
    padding: 3px 12px;
    cursor: pointer;
    border-radius: 4px;
}

/* 2. 編集時の追加/削除ボタン（左下） */
#inline-edit-actions {
    position: absolute;
    left: 10px;
    bottom: 10px;
    display: none; /* 初期非表示 */
    gap: 10px;
    z-index: 105; /* dialogue-box(100)内 */
}

/* シンプルで馴染むアイコンボタン */
#inline-add-btn, #inline-delete-btn {
    background: none;
    border: none;
    color: var(--accent-color);
    cursor: pointer;
    opacity: 0.6;
    padding: 5px;
    transition: opacity 0.2s, color 0.2s;
}

#inline-add-btn:hover, #inline-delete-btn:hover {
    opacity: 1;
}

#inline-delete-btn:hover {
    color: #ff6b6b; /* ゴミ箱はホバー時に赤く */
}

/* 3. 右上のアセット変更ボックス */
#novel-asset-controls {
    position: absolute;
    top: 10px;
    right: 70px; /* フローティングコントロールの左隣 */
    display: none; /* 初期非表示 */
    gap: 8px;
    background: rgba(0,0,0,0.7);
    padding: 5px;
    border-radius: 5px;
    z-index: 110; /* dialogue-box(100)より上 */
}

/* シンプルなセレクトボックス */
#novel-asset-controls select {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 2px 5px;
    font-size: 0.8rem;
    cursor: pointer;
    border-radius: 3px;
    font-family: 'Noto Sans JP', sans-serif;
}

#novel-asset-controls select option {
    background: #222;
    color: white;
}

        /* --- ⏳ ローディング --- */
        #loading-indicator {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: var(--accent-color); z-index: 300;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s;
            font-family: var(--font-serif);
        }
        .spinner {
            width: 50px; height: 50px; 
            border: 3px solid rgba(192, 160, 128, 0.2); 
            border-top: 3px solid var(--accent-color);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }


  .edit-tabs .tab-btn {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #444; color: #888;
    padding: 6px; font-size: 0.75rem; border-radius: 4px 4px 0 0; cursor: pointer;
}
.edit-tabs .tab-btn.active {
    background: rgba(192,160,128,0.2); color: var(--accent-color); border-color: var(--accent-color);
}
.tab-content label { display: block; font-size: 0.65rem; color: var(--accent-color); margin-bottom: 2px; }
.tab-content input, .tab-content textarea {
    background: rgba(0,0,0,0.4); border: 1px solid #555; color: white; padding: 6px; border-radius: 4px; font-size: 0.9rem;
}


.ep-tag {
    background: rgba(192, 160, 128, 0.2);
    padding: 2px 8px;
    border-radius: 4px;
}

.add-card {
    border: 2px dashed rgba(192, 160, 128, 0.4);
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.add-icon {
    font-size: 3rem;
    color: var(--accent-color);
    margin-bottom: 10px;
}

.ep-selector-wrapper { display: flex; flex-direction: column; gap: 20px; padding: 10px; }
.custom-select {
    width: 100%; padding: 12px; background: rgba(30, 41, 59, 0.8);
    border: 1px solid var(--accent-color); color: var(--text-color);
    border-radius: 8px; font-size: 1rem; outline: none;
}
.ep-preview-card {
    padding: 20px;
}

.ep-summary-text {
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 20px;
    color: #cbd5e1;
    font-style: italic;
}

.ep-info-grid {
    display: grid;
    gap: 15px;
    margin-bottom: 25px;
}

.info-item .label {
    display: block;
    font-size: 0.75rem;
    color: var(--accent-color);
    margin-bottom: 4px;
}

.char-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

/* 読むボタン */
.start-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(to right, #c0a080, #a88a68);
    color: #0f172a;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 1.1rem;
    cursor: pointer;
    transition: 0.3s;
}

.start-btn:hover {
    filter: brightness(1.2);
    transform: scale(1.02);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 固定フッターのスタイル */
.ep-footer-fixed {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, var(--bg-color) 80%, transparent);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 2020;
}

/* スワイプエリアの調整 */
.swipe-area {
    min-height: 100%;
    padding-bottom: 150px; /* フッターと被らないように余白を確保 */
    touch-action: pan-y; /* 上下スクロールは許容し、左右はJSで制御 */
}

/* ページ切り替え時のアニメーション（任意） */
.fade-in-swipe {
    animation: fadeInSwipe 0.3s ease-out;
}
@keyframes fadeInSwipe {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
}

.fullscreen-content {
    /* 前回の設定を継承しつつ微調整 */
    padding-top: 80px !important;
}

    </style>
</head>
<body>
    <div id="loading-indicator">
        <div class="spinner"></div>
        <div id="loading-text">Loading World...</div>
    </div>

    <div id="floating-controls">
        <button id="episode-select-icon" class="control-button" title="物語を選択">
            <span>📖</span> 
        </button> 
     
        <button onclick="window.location.href='asset_upload.html'"  class="control-button" >
            <span>🖼️</span> 
        </button>

    </div>
    
    <div id="novel-asset-controls">
        <select id="asset-background" title="背景"></select>
        <select id="asset-special" title="特殊画像"></select>
        <select id="asset-effect" title="エフェクト"></select>
    </div>


    <select id="episode-select" style="display: none;"></select>
    
    <div id="novel-container">
        <div id="background" class="layer-image"></div>
        
        <img id="special-image" class="layer-image" src="" alt="" style="display: none;">
        
        <img id="character" src="" alt="">
        
        <img id="effect-image" class="layer-image" src="" alt="" style="display: none;">

        <div id="dialogue-box">
    <div id="display-area" style="display: block; position: relative; width: 100%; height: 100%;">
        <div id="character-name"></div>
        <div id="dialogue-text"></div>
    </div>

    <div id="inline-edit-form" style="display: none; flex-direction: column; gap: 8px; width: 100%;">
        <div class="edit-tabs" style="display: flex; gap: 4px; margin-bottom: 2px;">
            <button type="button" onclick="switchInlineEditTab('char')" class="tab-btn active" id="tab-btn-char">キャラ・台詞</button>
            <button type="button" onclick="switchInlineEditTab('asset')" class="tab-btn" id="tab-btn-asset">背景・演出</button>
        </div>

        <div id="tab-content-char" class="tab-content">
            <div style="display: flex; align-items: center; width: 100%; gap: 8px; ">
                <input type="text" id="inline-edit-name" placeholder="名前" style="flex: 1; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 4px 8px; border-radius: 4px;">
                <input type="text" id="inline-edit-face" placeholder="表情" style="width: 100px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 4px 8px; border-radius: 4px;">
            </div>
            <textarea id="inline-edit-textarea" placeholder="セリフを入力..." style="width: 100%; height: 70px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; resize: none;"></textarea>
        </div>

        <div id="tab-content-asset" class="tab-content" style="display: none;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <div>
                    <label style="display: block; font-size: 0.7rem; color: var(--accent-color); margin-bottom: 2px;">背景タグ</label>
                    <input type="text" id="inline-edit-bg" placeholder="bg_forest" style="width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 4px 8px; border-radius: 4px;">

// 他の state 定義などがある場所に追記
async function loadEpisodeData(episodeNumber, target_scene_number = null) {
    showLoading(true);
    try {
        // 1. Supabaseからデータを取得
        const { data, error } = await supabaseClient
            .from('vs_scenes_with_assets')
            .select('*')
            .eq('episode', episodeNumber)
            .order('scene_number', { ascending: true });

        if (error) throw error;
        if (!data || data.length === 0) {
            alert('指定されたエピソードにデータがありません。');
            return;
        }

        // --- 📥 データの穴埋め・背景引き継ぎ処理 ---
        let lastCharacterImg = "";
        let characterDisplayEnabled = false; 
        
        // 【重要】背景は「グローバルに保存されている前回の画像」から開始する
        let currentProcessBackground = globalLastBackground;

// --- 📥 データの穴埋め・背景引き継ぎ処理 --- の直前あたりに追加

        // --- ★新機能：アセットセレクトボックスのOptionを生成する ---
        // 汎用関数
        const populateSelect = (select, tags, isOptional = true) => {
            select.innerHTML = '';
            if (isOptional) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = '(なし)';
                select.appendChild(opt);
            }
            tags.forEach(tag => {
                if (!tag) return;
                const opt = document.createElement('option');
                opt.value = tag;
                opt.textContent = tag;
                select.appendChild(opt);
            });
        };

        // アセットの抽出（既存の処理）
        const charTags = new Set();
        const bgTags = new Set();
        const specialTags = new Set();
        const effectTags = new Set();
        // ... (data.forEach 内で各Setにtagを追加する既存のループ処理) ...
        data.forEach(scene => {
            if (scene.background) bgTags.add(scene.background);
            if (scene.face) charTags.add(scene.face);
            if (scene.special) specialTags.add(scene.special);
            if (scene.effect) effectTags.add(scene.effect);
        });


        // --- データの穴埋め（filledData）へ続く ---

        const filledData = data.map(scene => {
            // --- A. 背景の引き継ぎ処理 ---
            // 背景画像(URL)が空の場合、直前の画像URLをセットする
            if (!scene.background_image || scene.background_image === "") {
                scene.background_image = currentProcessBackground;
            } else {
                // 新しい背景が設定されている場合、キャラ表示フラグをリセット（場所移動の想定）
                if (currentProcessBackground !== scene.background_image) {
                    characterDisplayEnabled = false;
                }
                // 最新の背景画像URLを更新
                currentProcessBackground = scene.background_image;
            }

            // --- B. 挿絵モード（Special）の判定 ---
            const isIllustrationMode = (scene.special && scene.special !== "OFF");

            // --- C. キャラクター画像の処理 ---
            const charName = scene.character || "";
            const isSkipTarget = (charName === "ナレーション" || charName === "チハル");

            if (!isSkipTarget && scene.character_image) {
                characterDisplayEnabled = true;
                lastCharacterImg = scene.character_image;
            }

            // 表示の確定ロジック
            if (isIllustrationMode) {
                scene.character_image = "";
                // 挿絵のときは背景を消す（もし背景の上に挿絵を出すならここを調整）
                scene.background_image = ""; 
            } else if (!characterDisplayEnabled) {
                scene.character_image = "";
            } else if (isSkipTarget) {
                scene.character_image = lastCharacterImg;
            } else {
                if (!scene.character_image || scene.character_image === "") {
                    scene.character_image = lastCharacterImg;
                } else {
                    lastCharacterImg = scene.character_image;
                }
            }
            return scene;
        });

        // 最後に現れた背景画像URLを保存（次のエピソード読み込み時に利用）
        globalLastBackground = currentProcessBackground;

        // 2. 状態を更新
        state.episodeData = filledData;

        // 3. 表示位置（インデックス）を決定
        if (target_scene_number) {
            const idx = filledData.findIndex(s => Number(s.scene_number) === Number(target_scene_number));
            state.sceneIndex = idx !== -1 ? idx : 0;
        } else {
            state.sceneIndex = 0;
        }

        renderScene(state.episodeData[state.sceneIndex]); 
        updateUI();

    } catch (err) {
        console.error('Data loading error:', err);
        alert('読み込みエラー: ' + err.message);
    } finally {
        showLoading(false);
    }
}

async function preloadAssetsSmart(currentIndex, count) {
        const endIndex = Math.min(currentIndex + count, state.episodeData.length);
        const targets = state.episodeData.slice(currentIndex, endIndex);
        
        const required = { bg: new Set(), char: new Set(), special: new Set(), effect: new Set() };
        
        targets.forEach(s => {
            // NOTE: 直接URL(s.background_image等)はfetchAssetsでは先読みできないが、
            // タグ指定のアセットだけはここでリクエストする
            if (s.background && !state.loadedAssets.bg[s.background]) required.bg.add(s.background);
            if (s.character && !state.loadedAssets.char[s.character]) required.char.add(s.character);
            if (s.special && !state.loadedAssets.special[s.special]) required.special.add(s.special);
            if (s.effect && !state.loadedAssets.effect[s.effect]) required.effect.add(s.effect);
        });

        const promises = [];
        if (required.bg.size) promises.push(fetchAssets('background', required.bg, state.loadedAssets.bg));
        if (required.char.size) promises.push(fetchAssets('character', required.char, state.loadedAssets.char));
        if (required.special.size) promises.push(fetchAssets('special_image', required.special, state.loadedAssets.special));
        if (required.effect.size) promises.push(fetchAssets('effect', required.effect, state.loadedAssets.effect));

        await Promise.all(promises);
    }

    async function backgroundLoadRest(startIndex) {
        const CHUNK = 10;
        for (let i = startIndex; i < state.episodeData.length; i += CHUNK) {
            await preloadAssetsSmart(i, CHUNK);
            await new Promise(r => setTimeout(r, 1000));
        }
    }

  async function fetchAssets(type, tagSet, targetStore) {
    if (!tagSet.size) return;
    
    try {
        // 修正ポイント1: supabase -> supabaseClient に変更
        // 修正ポイント2: 必要なアセットタイプで絞り込み
        const { data: list, error } = await supabaseClient
            .from('assets')
            .select('*')
            .eq('asset_type', type);

        if (error) throw error;

        (list || []).forEach(a => {
            // 修正ポイント3: カラム名を image_url と face に合わせる
            if (a.tag && a.image_url) {
                if (type === 'character' && a.face) {
                    // キャラクター名_表情タグ をキーにする
                    const key = `${a.tag}_${a.face}`;
                    targetStore[key] = a.image_url;
                } else {
                    // 背景や演出用
                    targetStore[a.tag] = a.image_url;
                }
            }
        });
    } catch (e) {
        console.warn(`Failed to fetch assets for ${type}:`, e);
    }
}

/* =================================================================
        描画 (レンダリング)
       ================================================================= */

function renderScene(s) {
    if (!s) return;

    // --- 💬 テキスト・名前の表示 ---
    ui.name.textContent = s.character || '';
    ui.text.textContent = s.text || ''; 

    // --- 🖼️ 描画判定 ---
    // ① special に値があり、かつ "OFF" でない場合は挿絵モード
    const isIllustrationMode = (s.special && s.special !== "OFF");

// --- 🌌 背景（Background）の描画 ---
    const bgUrl = isIllustrationMode ? (s.special_image || s.special) : (s.background_image || s.background);
   
 // ui.bg を ui.bgDiv に変更// ui.bg ではなく ui.bgDiv を使う
updateImage(ui.bgDiv, bgUrl, state.loadedAssets.bg, true);

    // --- 👥 キャラクター（Character）の描画 ---
    if (isIllustrationMode || (!s.character_image && !s.character)) {
        // 挿絵モード、またはキャラ指定がない場合は非表示
        ui.charImg.style.display = 'none';
    } else {
        ui.charImg.style.display = 'block';
        updateImage(ui.charImg, s.character_image || s.character, state.loadedAssets.char, false);
    }

    // --- ✨ エフェクト・その他 ---
    // SpecialImgは背景として使っているので、ここでは個別に表示させない（または非表示にする）
    if (ui.specialImg) ui.specialImg.style.display = 'none';

    updateImage(ui.effectImg, s.effect_image || s.effect, state.loadedAssets.effect, false);

    // キャラクターの演出クラス
    ui.charImg.className = ''; 
    if (s.effect && String(s.effect).includes('影')) {
        ui.charImg.classList.add('flashback-shadow');
    }
    
    saveProgress();
}

// 画面上のUI（ボタンの活性・非活性など）を更新する関数
function updateUI() {
    if (!state.episodeData || state.episodeData.length === 0) return;

    const isFirst = state.sceneIndex === 0;
    const isLast = state.sceneIndex === state.episodeData.length - 1;

    // 前へ・次へボタンの制御（ID名はご自身のHTMLに合わせてください）
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    if (prevBtn) prevBtn.disabled = isFirst;
    if (nextBtn) nextBtn.disabled = isLast;

    // 現在の進捗表示（例：1 / 20）
    const counter = document.getElementById('scene-counter');
    if (counter) {
        counter.textContent = `${state.sceneIndex + 1} / ${state.episodeData.length}`;
    }
}

    function updateImage(el, tag, assetStore, isBg) {
        const currentScene = state.episodeData[state.sceneIndex];
        let src = '';
        
        if (tag && (tag.startsWith('http') || tag.startsWith('data:'))) {
            src = tag;
        } 
        else if (tag && assetStore) {
            if (el === ui.charImg && currentScene) {
                const faceTag = currentScene.face || 'default';
                const key = `${tag}_${faceTag}`; 
                
                if (assetStore[key]) src = assetStore[key];
                else if (assetStore[tag]) src = assetStore[tag];
            } else {
                if (assetStore[tag]) src = assetStore[tag];
            }
        }

        if (isBg) {
            if (!src) {
                el.classList.remove('visible');
            } else {
                if (el.style.backgroundImage.includes(src)) {
                     el.classList.add('visible'); 
                     return;
                }
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    el.style.backgroundImage = `url("${src}")`;
                    el.classList.add('visible');
                };
            }
        } else {
            if (!src) {
                el.classList.remove('visible');
                el.src = '';
                el.style.display = 'none';
            } else {
                el.style.display = 'block';
                if (el.src === src && el.classList.contains('visible')) return;

                el.classList.remove('visible');
                el.src = src;
                
                if (el.complete) {
                    el.classList.add('visible');
                } else {
                    el.onload = () => el.classList.add('visible');
                }
            }
        }
    }

// 1180行目付近
ui.container.addEventListener('pointerup', e => {
    // 【最優先ガード】インライン編集モード中は、どこをクリックしてもページ送りを絶対にさせない
    if (state.isInlineEditing) return;

    // モーダルが開いている時も何もしない
    if (state.modalMode || ui.modal.style.display === 'flex') return;
    
    // 以下、通常のページ送り判定（既存のコードを活かす）
    if (e.target.closest('#floating-controls')) return;
    if (e.target.closest('#dialogue-box')) return;

    const isLeft = e.clientX < window.innerWidth * 0.3;
    if (isLeft) prevScene();
    else nextScene();
});

let touchStartX = 0;
let touchEndX = 0;

async function renderEpisodeDial() {
    const select = document.getElementById('ep-dial-select');
    const previewArea = document.getElementById('ep-preview-area');
    const previewFooter = document.getElementById('ep-preview-footer');
    
    const { data: episodes, error } = await supabaseClient.from('distinct_episodes').select('*');
    if (error || !episodes) return;

    // プルダウン生成（中略：以前のロジックと同様）
    select.innerHTML = '<option value="">話を選択</option>';
    episodes.forEach(ep => {
        const opt = document.createElement('option');
        opt.value = ep.episode;
        opt.textContent = `第${ep.episode}話：${ep.title || ''}`;
        select.appendChild(opt);
    });

    // 表示更新関数
    const updateDisplay = async (epId) => {
        const ep = episodes.find(e => e.episode == epId);
        if (ep) {
            select.value = epId;
            updatePreviewUI(ep); // 以前作成したUI更新関数
            previewArea.style.display = 'block';
            previewFooter.style.display = 'flex';
            
            // アニメーション適用
            previewArea.classList.remove('fade-in-swipe');
            void previewArea.offsetWidth; // reflow
            previewArea.classList.add('fade-in-swipe');
        }
    };

    select.onchange = () => updateDisplay(select.value);

    // --- 左右スワイプの実装 ---
    const container = document.getElementById('episode-list-container');
    
    container.ontouchstart = e => {
        touchStartX = e.changedTouches[0].screenX;
    };

    container.ontouchend = e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    };

    function handleSwipe() {
        const swipeDistance = touchEndX - touchStartX;
        const threshold = 50; // スワイプと判定する距離
        
        const currentIndex = episodes.findIndex(e => e.episode == select.value);
        
        if (swipeDistance < -threshold) {
            // 右から左へスワイプ：次のエピソード
            if (currentIndex < episodes.length - 1) {
                updateDisplay(episodes[currentIndex + 1].episode);
            }
        } else if (swipeDistance > threshold) {
            // 左から右へスワイプ：前のエピソード
            if (currentIndex > 0) {
                updateDisplay(episodes[currentIndex - 1].episode);
            }
        }
    }

    // 初期表示（現在のエピソード）
    if (ui.epSelect.value) {
        updateDisplay(ui.epSelect.value);
    }
}

    document.getElementById('preview-summary').textContent = ep.summary || "あらすじはありません。";
    
    const exclude = ['ナレーション', 'チハル', 'なし', ''];
    const filteredChars = (ep.characters || "").split(', ').filter(c => !exclude.includes(c));
    document.getElementById('preview-characters').innerHTML = 
        filteredChars.map(c => `<span class="ep-tag">${c}</span>`).join('') || "（主要キャラのみ）";

    // 背景（場所）を動的に取得
    const { data: scenes } = await supabaseClient.from('scenes').select('background').eq('episode', ep.episode);

    document.getElementById('preview-locations').textContent = locations.join('、') || "設定なし";

    document.getElementById('start-episode-btn').onclick = () => {
        ui.epSelect.value = ep.episode;
        loadEpisodeData(ep.episode);
        closeModal();
    };

    const updateFaceOnly = async (nextFace) => {
        const s = state.episodeData[state.sceneIndex];
        if (!s) return;
        try {
            await supabaseClient.from('scenes').update({ face: nextFace }).eq('id', s.id);
            const { data: assetData } = await supabaseClient.from('assets').select('image_url').eq('asset_type', 'character').eq('tag', s.character).eq('face', nextFace).single();
            s.face = nextFace;
            if (assetData) s.character_image = assetData.image_url;
            if (ui.inlineEditFace) ui.inlineEditFace.value = nextFace;
            renderScene(s); 
        } catch (err) { console.error("表情更新失敗:", err); }
    };

    // --- キャラ画像タッチで表情切り替え ---
    if (ui.charImg) {
        ui.charImg.addEventListener('pointerup', async (e) => {
            if (!state.isInlineEditing) return;
            e.stopPropagation();
            const s = state.episodeData[state.sceneIndex];
            if (!s || !s.character || s.character === "ナレーション") return;
            let faceList = characterFaceCache[s.character];
            if (!faceList) {
                const { data } = await supabaseClient.from('assets').select('face').eq('asset_type', 'character').eq('tag', s.character);
                if (data) { faceList = data.map(item => item.face); characterFaceCache[s.character] = faceList; }
            }
            if (faceList && faceList.length >= 2) {
                const currentIndex = faceList.indexOf(s.face);
                const nextIndex = (currentIndex + 1) % faceList.length;
                await updateFaceOnly(faceList[nextIndex]);
            }
        });
    }

    // --- シーン追加（現在のシーンをコピーして次に挿入） ---
    if (ui.inlineAddBtn) {
        ui.inlineAddBtn.onclick = async (e) => {
            e.stopPropagation();
            const s = state.episodeData[state.sceneIndex];
            if (!s) return;
            if (!confirm("現在のシーンをコピーして新しく追加しますか？")) return;

            try {
                showLoading(true);
                const newSceneNum = s.scene_number + 1;
                const episodeId = s.episode;

                // 1. 後続の番号を後ろから順に+1
                const { data: laterScenes } = await supabaseClient
                    .from('scenes')
                    .select('id, scene_number')
                    .eq('episode', episodeId)
                    .gte('scene_number', newSceneNum)
                    .order('scene_number', { ascending: false });

                if (laterScenes) {
                    for (const row of laterScenes) {
                        await supabaseClient.from('scenes').update({ scene_number: row.scene_number + 1 }).eq('id', row.id);
                    }
                }

                // 2. コピー挿入
                const { error } = await supabaseClient.from('scenes').insert([{
                    episode: episodeId,
                    scene_number: newSceneNum,
                    character: s.character,
                    face: s.face,
                    background: s.background,
                    text: s.text 
                }]);

                if (error) throw error;
                window.location.reload();
            } catch (err) { alert("追加失敗: " + err.message); } 
            finally { showLoading(false); }
        };
    }

    // --- シーン削除 ---
    if (ui.inlineDeleteBtn) {
        ui.inlineDeleteBtn.onclick = async (e) => {
            e.stopPropagation();
            const s = state.episodeData[state.sceneIndex];
            if (!s || !confirm("このシーンを削除してもよろしいですか？")) return;

            try {
                showLoading(true);
                const deletedNum = s.scene_number;
                const episodeId = s.episode;

                await supabaseClient.from('scenes').delete().eq('id', s.id);

                const { data: laterScenes } = await supabaseClient
                    .from('scenes')
                    .select('id, scene_number')
                    .eq('episode', episodeId)
                    .gt('scene_number', deletedNum)
                    .order('scene_number', { ascending: true });

                if (laterScenes) {
                    for (const row of laterScenes) {
                        await supabaseClient.from('scenes').update({ scene_number: row.scene_number - 1 }).eq('id', row.id);
                    }
                }
                window.location.reload();
            } catch (err) { alert("削除失敗: " + err.message); } 
            finally { showLoading(false); }
        };
    }

// --- 保存ボタン ---

let mainTouchStartX = 0;

function setupMainControls() {
    // 既存のクリックイベントを無効化
    ui.container.onclick = null;

    // タッチ開始時の座標を記録
    ui.container.addEventListener('touchstart', (e) => {
        // 編集モード中やモーダル（概要画面）が出ている時はスワイプさせない
        if (state.isInlineEditing || (ui.modal && ui.modal.style.display === 'flex')) return;
        mainTouchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    // タッチ終了時の判定
    ui.container.addEventListener('touchend', (e) => {
        if (state.isInlineEditing || (ui.modal && ui.modal.style.display === 'flex')) return;
        
        const mainTouchEndX = e.changedTouches[0].screenX;
        const swipeDistance = mainTouchEndX - mainTouchStartX;
        const threshold = 50; // スワイプと判定する距離(px)

        if (swipeDistance < -threshold) {
            // 右から左へスワイプ(←)
            console.log("スワイプ: 前に戻る");
            prevScene();
        } else if (swipeDistance > threshold) {
            // 左から右へスワイプ(→)
            console.log("スワイプ: 次に進む");
            nextScene();
        }
    }, { passive: true });
}

// 前に戻る処理
function prevScene() {
    if (state.sceneIndex > 0) {
        state.sceneIndex--;
        renderScene(state.episodeData[state.sceneIndex]);
    }
}

// 次に進む処理
function nextScene() {
    if (state.sceneIndex < state.episodeData.length - 1) {
        state.sceneIndex++;
        renderScene(state.episodeData[state.sceneIndex]);
    } else {
        // エピソード終了時の処理が必要ならここに記述
        console.log("エピソードの最後です");
    }
}
// スクリプトの最後の方で実行
document.addEventListener('DOMContentLoaded', () => {
    // 既存の初期化処理...
    setupMainControls();
});
