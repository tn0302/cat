<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="/manifest.json">
    <title>勇者ハーレム - ファンタジービューア</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="safe-area-top"></div>

    <div id="loading-indicator">
        <div class="spinner"></div>
        <div id="loading-text">Loading World...</div>
    </div>
    
    <div id="novel-container">
<div id="novel-container">
    <div id="background" class="layer-image"></div>
    
    <img id="character" class="layer-image" src="" alt="" >
    
    <img id="special" class="layer-image" src="" alt="" >
    
    <img id="effect" class="layer-image" src="" alt="" >

    
        <div id="dialogue-box">
    <div id="display-area" style="display: block; position: relative; width: 100%; height: 100%;">
        <div id="character-name"></div>
        <div id="dialogue-text"></div>
    </div>

    <div id="inline-edit-form" style="display: none; flex-direction: column; gap: 8px; width: 100%;">
        <div class="edit-tabs" style="display: flex; gap: 4px; margin-bottom: 2px;">
            <button type="button" onclick="switchInlineEditTab('char')" class="tab-btn active" id="tab-btn-char">キャラ・台詞</button>
            <button type="button" onclick="switchInlineEditTab('asset')" class="tab-btn" id="tab-btn-asset">背景・演出</button>
        </div>

        <div id="tab-content-char" class="tab-content">
            <div style="display: flex; align-items: center; width: 100%; gap: 8px; ">
                <input type="text" id="inline-edit-name" placeholder="名前" style="flex: 1; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 4px 8px; border-radius: 4px;">
                <input type="text" id="inline-edit-face" placeholder="表情" style="width: 100px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 4px 8px; border-radius: 4px;">
            </div>
            <textarea id="inline-edit-textarea" placeholder="セリフを入力..." style="width: 100%; height: 70px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; resize: none;"></textarea>
        </div>

        <div id="tab-content-asset" class="tab-content" style="display: none;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <div>
                    <label style="display: block; font-size: 0.7rem; color: var(--accent-color); margin-bottom: 2px;">背景タグ</label>
                    <input type="text" id="inline-edit-bg" placeholder="bg_forest" style="width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 4px 8px; border-radius: 4px;">
                </div>
                <div>
                    <label style="display: block; font-size: 0.7rem; color: var(--accent-color); margin-bottom: 2px;">演出画像</label>
                    <input type="text" id="inline-edit-special" placeholder="flash_red" style="width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 4px 8px; border-radius: 4px;">
                </div>
                <div style="grid-column: span 2;">
                    <label style="display: block; font-size: 0.7rem; color: var(--accent-color); margin-bottom: 2px;">エフェクト</label>
                    <input type="text" id="inline-edit-effect" placeholder="shake_heavy" style="width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 4px 8px; border-radius: 4px;">
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;  ">
            <div style="display: flex; gap: 12px;">
                <button id="inline-add-btn" title="新しいシーンを追加" style="background:none; border:none; color:var(--accent-color); cursor:pointer;">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <button id="inline-delete-btn" title="このシーンを削除" style="background:none; border:none; color:#ff6b6b; cursor:pointer;">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="inline-cancel-btn" style="background: #64748b; color: white; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 0.85rem;">戻る</button>
                <button id="inline-save-btn" style="background: var(--accent-color); color: #0f172a; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85rem;">保存</button>
            </div>
        </div>
    </div>
    <button id="inline-edit-btn" title="このシーンを編集" style="position: absolute; right: 10px; bottom: 10px; background: none; border: none; color: var(--accent-color); cursor: pointer; opacity: 0.6; padding: 5px; transition: opacity 0.2s;">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        </button>
</div>

<div id="floating-controls"></div>
    </div>

    <div class="safe-area-bottom"></div>
<div id="viewer-hud" class="hud-layer" style="display: none;">
    <div class="hud-header">
        <div class="hud-header-left" onclick="openModal()">
            <span id="hud-episode-number">← 第 - 話</span>
        </div>
<div class="hud-header-right" style="pointer-events: auto;">

    <a href="asset_upload.html" class="hud-icon-btn-mini svg-btn" title="アセット管理">
        <svg viewBox="0 0 24 24" class="svg-icon">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l3 4 2-2.39z"/>
        </svg>
        <span class="btn-text">アセット</span>
    </a>

    <a href="character_settings.html" class="hud-icon-btn-mini svg-btn" title="キャラ画像設定">
        <svg viewBox="0 0 24 24" class="svg-icon">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm6 12H6v-1c0-2 4-3.1 6-3.1s6 1.1 6 3.1v1z"/>
        </svg>
        <span class="btn-text">キャラ設定</span>
    </a>

</div>
    </div>

    <div class="hud-footer">
        <div class="hud-seekbar-flex-container">
            <input type="range" id="hud-seekbar" min="0" max="100" value="0">
            <div id="hud-page-counter-inline">
                <span id="hud-current-scene">1</span> / <span id="hud-total-scenes">1</span>
            </div>
        </div>
    </div>
</div>
</div>



    <div id="novel-asset-controls">
        <select id="asset-background" title="背景"></select>
        <select id="asset-special" title="特殊画像"></select>
        <select id="asset-effect" title="エフェクト"></select>
    </div>


    <select id="episode-select" style="display: none;"></select>
    


<div id="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000;">
    <div id="modal-overlay" style="position: absolute; width: 100%; height: 100%; background: var(--bg-color);"></div>
    
    <div id="modal-content" class="fullscreen-content">
        <div class="modal-header-controls">
            <select id="ep-dial-select" class="custom-select-mini">
                <option value="">話を選択</option>
            </select>
            <button class="modal-control-btn" onclick="openEpisodeEdit()" title="エピソード情報を編集">✎</button>
            <button class="modal-control-btn" onclick="window.location.href='bulk_upload.html'" title="新規入稿">＋</button>
        </div>

        <div id="episode-list-container" class="swipe-area">
            <div id="ep-preview-area" style="display:none;">
                <h2 id="preview-title" class="full-ep-title"></h2>
                
                <div class="ep-info-grid">
                    <div class="info-item">
                        <span class="label">👤 登場人物</span>
                        <div id="preview-characters" class="char-tags"></div>
                    </div>
                    <div class="info-item">
                        <span class="label">📍 主な場所</span>
                        <div id="preview-locations" class="value"></div>
                    </div>
                </div>

                <div class="label">📜 あらすじ</div>
                <div id="preview-summary" class="ep-summary-fulltext"></div>
            </div>

            <div id="ep-edit-form-area" style="display:none;">
                <h3 style="color:var(--accent-color);">エピソード設定</h3>
                <label class="label">タイトル</label>
                <input type="text" id="edit-ep-title">
                <label class="label">概要・あらすじ</label>
                <textarea id="edit-ep-summary" rows="10"></textarea>
            </div>

        
        </div>

        <div id="ep-preview-footer" class="ep-footer-fixed" style="display:none;">
            <button id="start-episode-btn" class="start-btn">このエピソードを読む</button>
            <button class="cancel-button-link" onclick="closeModal()">戻る</button>
        </div>
        
        <div id="ep-edit-footer" class="ep-footer-fixed" style="display:none;">
            <button class="action-btn" onclick="saveEpisodeInfo()">変更を保存</button>
            <button class="cancel-button-link" onclick="closeEpisodeEdit()">キャンセル</button>
        </div>
    </div>
</div>
</div>
</div>
</div>
</div>
</div>
    <div id="character-profile-modal" class="modal-overlay" style="display:none; z-index: 2000;">
    <div class="ep-modal-content profile-content">
        <div class="ep-modal-header">
            <h2 id="profile-char-name" style="font-family: var(--font-serif); color: var(--accent-color);"></h2>
            <button class="close-btn" onclick="closeProfileModal()">×</button>
        </div>
        <div class="ep-modal-body">
            <div id="profile-image-container" style="text-align:center; margin-bottom:15px;">
                <img id="profile-char-img" src="" style="max-width: 100%; border-radius: 8px; border: 1px solid var(--accent-color);">
            </div>
            <div class="label">📜 紹介文</div>
            <p id="profile-char-description" style="line-height:1.6; font-size:14px;"></p>
        </div>
        <div class="ep-footer-fixed">
            <a id="go-to-settings-btn" href="#" class="start-btn" style="text-decoration:none; text-align:center; display:block;">詳細設定（編集）へ</a>
            <button class="cancel-button-link" onclick="closeProfileModal()">閉じる</button>
        </div>
    </div>
<script src="app.js"></script>
</body>
</html>
